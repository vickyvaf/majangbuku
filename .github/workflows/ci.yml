name: CI/CD VPS Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-22.04

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: majangbuku
        ports:
          - 5435:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5435/majangbuku
      PAYLOAD_SECRET: 65f0847b1a01ace961d72ccc86bd0bc1d5ad55deeeb750a43e5ddaa8a7bcc801

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm install -g pnpm
          pnpm install

      - name: Wait for Postgres
        run: |
          for i in {1..10}; do
            pg_isready -h localhost -p 5435 && break
            echo "Waiting for postgres..."
            sleep 2
          done

      - name: Setup Payload (Import Map & Types)
        run: |
          pnpm run generate:importmap
          pnpm run generate:types

      - name: Migrate & Seed Database
        run: pnpm run payload:migrate

      - name: Build Next.js
        run: pnpm run build

      # 🚀 Deploy ke VPS
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            mkdir -p ~/apps/majangbuku
            cd ~/apps/majangbuku

            if [ ! -d ".git" ]; then
              git clone git@github.com:vickyvaf/majangbuku.git .
            else
              git fetch --all
              git reset --hard origin/main
            fi

            # Create/update .env file specifically for Docker internal network
            if [ -f ".env.production" ]; then
              cp .env.production .env
              # Adjust to use internal 'postgres' host instead of 'localhost'
              sed -i 's/localhost:5435/postgres:5432/g' .env
              echo ".env file generated/updated from .env.production"
            fi

            docker-compose up -d --build --remove-orphans

            # Run migrations on VPS
            docker-compose exec -T app pnpm run payload:migrate

            docker image prune -f
            docker-compose ps
