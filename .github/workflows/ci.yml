name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: majangbuku
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://postgres:password@localhost:5432/majangbuku' }}
      PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET || '65f0847b1a01ace961d72ccc86bd0bc1d5ad55deeeb750a43e5ddaa8a7bcc801' }}
      NEXT_PUBLIC_SERVER_URL: ${{ secrets.NEXT_PUBLIC_SERVER_URL || 'http://localhost:3000' }}

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Types
        run: pnpm generate:types

      - name: Type Check
        run: pnpm exec tsc --noEmit

      - name: Build
        run: pnpm build

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            cd /apps/majangbuku
            git pull origin main
            
            # Ensure .env exists with current secrets during build
            # We use a heredoc to avoid complex quoting issues
            cat > .env << 'EOF'
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            PAYLOAD_SECRET=${{ secrets.PAYLOAD_SECRET }}
            NEXT_PUBLIC_SERVER_URL=${{ secrets.NEXT_PUBLIC_SERVER_URL || 'http://localhost:3000' }}
            EOF
            
            pnpm install --frozen-lockfile
            pnpm generate:types
            pnpm build
            # If using PM2
            # pm2 restart majangbuku
            # If using Docker
            # docker compose up -d --build
