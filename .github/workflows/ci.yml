name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: majangbuku
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://postgres:password@localhost:5432/majangbuku' }}
      PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET || '65f0847b1a01ace961d72ccc86bd0bc1d5ad55deeeb750a43e5ddaa8a7bcc801' }}
      NEXT_PUBLIC_SERVER_URL: ${{ secrets.NEXT_PUBLIC_SERVER_URL || 'http://localhost:3000' }}

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Types
        run: pnpm generate:types

      - name: Type Check
        run: pnpm exec tsc --noEmit

      - name: Initialize Database Schema
        run: pnpm payload:db-push

      - name: Build
        run: pnpm build

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            # Use absolute home path to avoid expansion issues
            PROJECT_PATH="$HOME/majangbuku"
            
            # Ensure directory exists and enter it
            mkdir -p $PROJECT_PATH
            cd $PROJECT_PATH
            
            # Robust Git deployment
            if [ ! -d ".git" ]; then
              echo "Cloning repository..."
              git clone https://github.com/vickyvaf/majangbuku.git .
            else
              echo "Updating repository..."
              git fetch origin main
              git reset --hard origin/main
            fi
            
            # Create environment file
            cat > .env << 'EOF'
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            PAYLOAD_SECRET=${{ secrets.PAYLOAD_SECRET }}
            NEXT_PUBLIC_SERVER_URL=${{ secrets.NEXT_PUBLIC_SERVER_URL || 'http://localhost:3000' }}
            EOF
            
            # Deployment logic: Try docker compose (V2) then docker-compose (V1)
            if docker compose version >/dev/null 2>&1; then
              echo "Using docker compose (V2)"
              docker compose up -d --build
            elif command -v docker-compose >/dev/null 2>&1; then
              echo "Using docker-compose (V1)"
              docker-compose up -d --build
            else
              echo "Error: Neither 'docker compose' nor 'docker-compose' found."
              exit 1
            fi
