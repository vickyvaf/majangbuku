name: Deploy Database

on:
  push:
    branches:
      - main
    paths:
      - 'src/migrations/**'
      - 'src/collections/**'
      - 'src/payload.config.ts'
      - '.github/workflows/ci.yml'
      - 'docker-compose.yml'
      - 'Dockerfile'
      - 'package.json'

jobs:
  deploy-database:
    name: Deploy Database
    runs-on: ubuntu-22.04

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: majangbuku
        ports:
          - 5435:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5435/majangbuku
      PAYLOAD_SECRET: 65f0847b1a01ace961d72ccc86bd0bc1d5ad55deeeb750a43e5ddaa8a7bcc801

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm install -g pnpm
          pnpm install

      - name: Wait for Postgres
        run: |
          for i in {1..10}; do
            pg_isready -h localhost -p 5435 && break
            echo "Waiting for postgres..."
            sleep 2
          done

      - name: Setup Payload (Import Map & Types)
        run: |
          pnpm run generate:importmap
          pnpm run generate:types

      - name: Migrate & Seed Database
        run: pnpm run payload:migrate

      # 🚀 Deploy Database via Migration on VPS
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ~/apps/majangbuku

            if [ ! -d ".git" ]; then
              git clone git@github.com:vickyvaf/majangbuku.git .
            else
              git fetch --all
              git reset --hard origin/main
            fi

            # Create/update .env file specifically for Docker internal network
            if [ -f ".env.production" ]; then
              cp .env.production .env
              sed -i 's/localhost:5435/postgres:5432/g' .env
            fi

            # Set higher timeout for Docker Compose
            export COMPOSE_HTTP_TIMEOUT=200
            export DOCKER_CLIENT_TIMEOUT=200

            # Force remove and recreate to fix ContainerConfig error (common with old docker-compose)
            docker-compose -p majangbuku rm -f -s app
            docker-compose -p majangbuku up -d postgres

            # Ensure postgres is ready
            echo "Waiting for postgres to be ready..."
            sleep 10

            # Start app with a fresh container
            docker-compose -p majangbuku up -d app

            # Run migrations on VPS
            docker-compose -p majangbuku exec -T app pnpm run payload:migrate

            docker image prune -f
            docker-compose -p majangbuku ps
