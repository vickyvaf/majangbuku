name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: majangbuku
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Prepare environment
        run: cp .env.production .env

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Types
        run: pnpm generate:types

      - name: Type Check
        run: pnpm exec tsc --noEmit

      - name: Initialize Database Schema
        run: pnpm payload:db-push

      - name: Build
        run: pnpm build:prod

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            # Use absolute home path to avoid expansion issues
            PROJECT_PATH="$HOME/majangbuku"
            
            # Ensure directory exists and enter it
            mkdir -p $PROJECT_PATH
            cd $PROJECT_PATH
            
            # Robust Git deployment
            if [ ! -d ".git" ]; then
              echo "Cloning repository..."
              git clone https://github.com/vickyvaf/majangbuku.git .
            else
              echo "Updating repository..."
              git fetch origin main
              git reset --hard origin/main
            fi
            
            # Use .env.production file directly
            cp .env.production .env
            
            # Jalankan postgres duluan supaya payload tersambung ke port 5435 pas di build
            echo "Running Postgres first so Next.js can connect during build..."
            docker-compose up -d postgres
            sleep 5
            
            # Deployment logic: Build and Restart payload
            echo "Building new image and restarting container..."
            DOCKER_BUILDKIT=1 COMPOSE_DOCKER_CLI_BUILD=1 docker-compose up -d --build payload
            
            # Bersihkan image lama yang sudah tidak terpakai agar disk VPS tidak penuh
            docker image prune -f || true
