services:
  payload:
    image: node:20-alpine
    ports:
      - "${PORT:-3001}:3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && pnpm run dev"
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://${DATABASE_USER:-postgres}:${DATABASE_PASSWORD:-password}@postgres:5432/${DATABASE_NAME:-majangbuku}
    env_file:
      - .env

  postgres:
    restart: always
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-password}
      POSTGRES_DB: ${DATABASE_NAME:-majangbuku}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${DATABASE_PORT:-5435}:5432"

volumes:
  pgdata:
  node_modules:
